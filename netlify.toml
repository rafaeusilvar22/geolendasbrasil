[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 3000
  framework = "#custom"

[build.environment]
  NODE_VERSION = "22"


[[redirects]]
  from = "/folclores"
  to = "/folclore"
  status = 301

[[redirects]]
  from = "/folclores/*"
  to = "/folclore/:splat"
  status = 301

[[redirects]]
  from = "/lendas"
  to = "/mitos-de-origem"
  status = 301

[[redirects]]
  from = "/lendas/*"
  to = "/mitos-de-origem/:splat"
  status = 301

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "text/javascript"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
